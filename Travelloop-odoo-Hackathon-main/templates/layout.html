<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Traveloop</title>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white shadow-sm p-4 flex justify-between">
        <a href="/" class="text-xl font-bold text-blue-600">Traveloop</a>
        <div class="space-x-4">
            <a href="/dashboard">My Trips</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <footer class="text-center p-8 text-slate-400 text-sm">
        &copy; 2026 Traveloop - Odoo Hackathon
    </footer>
</body>
</html>


<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Traveloop</title>

    <!-- MAIN CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/main.css') }}"
    >

    <!-- LEAFLET CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">
            Traveloop
        </div>

        <ul class="nav-links">

            <li>
                <a href="/">
                    Home
                </a>
            </li>

            <li>
                <a href="/trips">
                    Trips
                </a>
            </li>

            <li>
                <a href="/dashboard">
                    Dashboard
                </a>
            </li>

        </ul>

    </nav>


    <!-- MAIN CONTENT -->
    <main>

        {% block content %}
        {% endblock %}

    </main>


    <!-- FOOTER -->
    <footer class="footer">

        <p>
            © 2026 Traveloop. All rights reserved.
        </p>

    </footer>


    <!-- LEAFLET JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- MAIN JS -->
    <script
        src="{{ url_for('static', filename='js/main.js') }}"
    ></script>

</body>

</html>
