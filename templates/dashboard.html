<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Traveloop | Dashboard</title>
</head>
<body class="bg-gray-50">
    <nav class="bg-white border-b p-4 flex justify-between items-center">
        <span class="text-2xl font-extrabold text-blue-600">Traveloop</span>
        <div class="space-x-4">
            <a href="/profile" class="text-gray-600">Profile</a>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg">Plan New Trip</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-4">
        <h1 class="text-3xl font-bold">Welcome, Traveler!</h1> <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold text-lg">Upcoming Trips</h3>
                <p class="text-gray-500 mt-2">You have 0 active trips. Start dreaming!</p>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold text-lg">Budget Highlights</h3> <p class="text-gray-500 mt-2">View your cost breakdowns here.</p>
            </div>
        </div>
    </main>
</body>
</html>
