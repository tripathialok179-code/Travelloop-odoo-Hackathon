{% extends 'trip_layout.html' %}
{% block trip_content %}
<h2>Share Your AI Itinerary</h2>
<p style="margin-bottom: 2rem;">Allow friends or the public to view your beautifully crafted itinerary and cost breakdowns.</p>

<div class="card" style="max-width: 600px;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
        <div>
            <h3 style="margin-bottom: 0.25rem;">Public Link</h3>
            <p style="font-size: 0.875rem;">Anyone with this link can view the itinerary overview.</p>
        </div>
        <label style="position: relative; display: inline-block; width: 44px; height: 24px;">
            <input type="checkbox" checked style="opacity: 0; width: 0; height: 0;">
            <span style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--accent); border-radius: 24px; transition: .4s;"></span>
            <span style="position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s; transform: translateX(20px);"></span>
        </label>
    </div>
    
    <div style="display: flex; gap: 0.5rem;">
        <input type="text" class="form-control" value="https://traveloop.in/shared/{{ trip.id }}" readonly style="background: var(--bg-color); color: var(--text-muted);">
        <button class="btn btn-secondary">Copy</button>
    </div>
</div>
{% endblock %}
