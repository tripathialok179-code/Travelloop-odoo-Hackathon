<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveloop | Personalized Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .bg-gradient-mesh { background: radial-gradient(at 0% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <nav class="fixed top-0 w-full z-[100] px-6 py-4 glass">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-cyan-500 bg-clip-text text-transparent">Traveloop</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="/dashboard" class="hover:text-indigo-600 transition">My Trips</a> <a href="/create-trip" class="bg-indigo-600 text-white px-6 py-2 rounded-full shadow-lg hover:scale-105 transition">Plan Trip</a> <div class="h-10 w-10 rounded-full bg-slate-200 border border-white overflow-hidden cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=User" alt="Profile"> </div>
            </div>
        </div>
    </nav>

    <div class="pt-24 min-h-screen">
        {% block content %}{% endblock %}
    </div>

    <div id="toast-root" class="fixed top-24 right-6 space-y-3 z-[200]"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
