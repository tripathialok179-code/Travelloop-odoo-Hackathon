{% extends 'layout.html' %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh] px-4">
    <div class="w-full max-w-md glass p-10 rounded-3xl shadow-2xl animate-fade-in">
        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2> <p class="text-slate-500 mb-8">Ready for your next adventure?</p>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"> </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"> </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-xl hover:bg-indigo-700 transition">Sign In</button> </form>
        
        <p class="mt-6 text-center text-sm text-slate-500">
            Don't have an account? <a href="/signup" class="text-indigo-600 font-bold">Join Traveloop</a>
        </p>
    </div>
</div>
{% endblock %}
