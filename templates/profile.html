{% extends 'layout.html' %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; text-align: center; padding: 3rem 2rem;">
    <div style="width: 100px; height: 100px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; margin: 0 auto 1.5rem auto;">
        {{ g.user.name[0].upper() }}
    </div>
    <h1 style="margin-bottom: 0.25rem;">{{ g.user.name }}</h1>
    <p style="margin-bottom: 2rem;">{{ g.user.email }}</p>
    
    <div style="text-align: left; margin-bottom: 2rem;">
        <div class="form-group">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" value="{{ g.user.name }}">
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="{{ g.user.email }}">
        </div>
        <button class="btn btn-primary" style="width: 100%;">Save Changes</button>
    </div>
    
    <a href="{{ url_for('auth.logout') }}" style="color: var(--danger); font-weight: 500;">Log Out</a>
</div>
{% endblock %}
