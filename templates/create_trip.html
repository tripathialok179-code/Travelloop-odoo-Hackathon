{% extends 'layout.html' %}
{% block content %}
<div class="max-w-3xl mx-auto px-6 py-12">
    <div class="glass p-12 rounded-[2.5rem] shadow-2xl">
        <h1 class="text-4xl font-bold mb-2">Create New Trip</h1> <p class="text-slate-500 mb-10">Set the foundation for your personalized itinerary.</p>

        <form id="create-trip-form" class="space-y-8">
            <div class="space-y-4">
                <label class="block text-sm font-bold text-slate-700">Trip Name</label>
                <input type="text" name="name" placeholder="e.g. Exploring the Swiss Alps" required
                       class="w-full px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition"> </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-700">Start Date</label>
                    <input type="date" name="start_date" required class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none"> </div>
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-700">End Date</label>
                    <input type="date" name="end_date" required class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none"> </div>
            </div>

            <div class="space-y-4">
                <label class="block text-sm font-bold text-slate-700">Description (Optional)</label>
                <textarea name="description" rows="3" placeholder="What are your goals for this trip?"
                          class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none"></textarea> </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 transform hover:-translate-y-1 transition-all">
                Generate My Itinerary </button>
        </form>
    </div>
</div>
{% endblock %}
